<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sign in — Tonight Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='10' fill='%23b3a4e6'/%3E%3Ccircle cx='20' cy='13' r='9' fill='%2306070f'/%3E%3C/svg%3E">
</head>
<body>

<div class="login">
  <form class="login__card" id="loginForm" autocomplete="on">
    <span class="wordmark">TONIGHT<small>Admin</small></span>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <p class="login__error" id="error" role="alert"></p>
    <button class="btn" type="submit" id="submitBtn">Sign in</button>
  </form>
</div>

<script>
(function () {
  "use strict";
  var form = document.getElementById("loginForm");
  var errorEl = document.getElementById("error");
  var btn = document.getElementById("submitBtn");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    errorEl.textContent = "";
    btn.disabled = true;
    fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
      .then(function (res) {
        if (res.ok) {
          window.location.href = "/admin/";
        } else {
          errorEl.textContent = res.data.error || "Sign-in failed.";
          btn.disabled = false;
        }
      })
      .catch(function () {
        errorEl.textContent = "Network error. Try again.";
        btn.disabled = false;
      });
  });
})();
</script>
</body>
</html>
